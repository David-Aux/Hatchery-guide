<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Incubation Guide — Hatchery Guide</title>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .guide-hero {
      background: linear-gradient(135deg, var(--green-dark) 0%, #0F4C2A 100%);
      border-radius: var(--radius-xl);
      padding: 32px;
      color: #fff;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }
    .guide-hero::before {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(217,119,6,0.2) 0%, transparent 70%);
      top: -60px; right: -60px;
    }
    .guide-hero h2 { color: #fff; font-size: 1.8rem; margin-bottom: 8px; }
    .guide-hero p  { color: rgba(255,255,255,0.6); max-width: 520px; }

    /* Stage cards */
    .stage-card {
      border-radius: var(--radius-xl);
      overflow: hidden;
      margin-bottom: 20px;
      border: 1.5px solid var(--parchment);
    }

    .stage-header {
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
      user-select: none;
    }

    .stage-header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .stage-icon-circle {
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .stage-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; }
    .stage-days  { font-size: 0.75rem; font-weight: 600; opacity: 0.7; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }
    .stage-chevron { font-size: 1rem; transition: transform 0.25s; }
    .stage-card.open .stage-chevron { transform: rotate(180deg); }

    .stage-body {
      display: none;
      padding: 0 24px 24px;
      background: #fff;
    }
    .stage-card.open .stage-body { display: block; }

    /* Params table */
    .params-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .param-box {
      background: var(--cream);
      border: 1.5px solid var(--parchment);
      border-radius: var(--radius-md);
      padding: 12px 14px;
    }

    .param-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-faint); margin-bottom: 4px; }
    .param-value { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--ink); }
    .param-range { font-size: 0.72rem; color: var(--ink-faint); margin-top: 2px; }

    /* Day-by-day */
    .day-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--cream-dark);
    }
    .day-row:last-child { border-bottom: none; }

    .day-number {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--amber-pale);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--amber-dark);
      flex-shrink: 0;
    }
    .day-number.candle   { background: var(--amber); color: #fff; }
    .day-number.lockdown { background: var(--red-pale); color: var(--red-alert); border: 1.5px solid var(--red-alert); }
    .day-number.hatch    { background: var(--green-light); color: var(--green-dark); border: 1.5px solid var(--green-mid); }

    .day-content { flex: 1; }
    .day-title   { font-size: 0.88rem; font-weight: 600; color: var(--ink); margin-bottom: 2px; }
    .day-detail  { font-size: 0.78rem; color: var(--ink-faint); line-height: 1.5; }
    .day-badges  { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }

    /* Troubleshooting */
    .trouble-item {
      padding: 16px 0;
      border-bottom: 1px solid var(--cream-dark);
    }
    .trouble-item:last-child { border-bottom: none; }
    .trouble-symptom { font-size: 0.9rem; font-weight: 700; color: var(--ink); margin-bottom: 6px; display: flex; gap: 8px; align-items: center; }
    .trouble-causes  { font-size: 0.82rem; color: var(--ink-mid); margin-bottom: 6px; }
    .trouble-fixes   { font-size: 0.82rem; color: var(--green-dark); font-weight: 500; }

    .quick-ref-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .qr-card {
      background: var(--cream);
      border: 1.5px solid var(--parchment);
      border-radius: var(--radius-md);
      padding: 16px;
    }
    .qr-card h4 { font-size: 0.82rem; margin-bottom: 10px; color: var(--ink-mid); }
    .qr-line { display: flex; justify-content: space-between; font-size: 0.8rem; padding: 4px 0; border-bottom: 1px solid var(--cream-dark); gap: 8px; }
    .qr-line:last-child { border-bottom: none; }
    .qr-line span:first-child { color: var(--ink-faint); }
    .qr-line span:last-child  { font-weight: 600; color: var(--ink); }
  </style>
</head>
<body>
<script src="app.js"></script>
<script src="shell.js"></script>
<script>
(async () => {
  const ctx = await initShell({ page: 'incubation-guide', title: 'Incubation Guide' });
  if (!ctx) return;
  renderGuide();
})();

    <!-- Stage 3 -->
    ${stageCard({
      id: 'stage3',

      bg: '#FEE2E2',

function stageCard({ id, color, bg, icon, title, days, open, params, days_detail }) {
  const paramsHTML = params.map(p => `
    <div class="param-box">
      <div class="param-label">${p.label}</div>
      <div class="param-value">${p.value}</div>
      <div class="param-range">${p.range}</div>
    </div>`).join('');

  const daysHTML = days_detail.map(d => {
    const isCandle   = INCUBATION.CANDLE_DAYS.includes(d.day);
    const isLockdown = d.day >= 18 && d.day <= 19;
    const isHatch    = d.day >= 20;
    const cls = isCandle ? 'candle' : isLockdown ? 'lockdown' : isHatch ? 'hatch' : '';
    return `
      <div class="day-row">
        <div class="day-number ${cls}">D${d.day}</div>
        <div class="day-content">
          <div class="day-title">${d.title}</div>
          <div class="day-detail">${d.detail}</div>
          ${d.badges?.length ? `<div class="day-badges">${d.badges.map(b => `<span class="badge badge-amber">${b}</span>`).join('')}</div>` : ''}
        </div>
      </div>`;
  }).join('');

  return `
    <div class="stage-card" id="${id}-card">
      <div class="stage-header" style="background:${bg}" onclick="toggleStage('${id}-card')">
        <div class="stage-header-left">
          <div class="stage-icon-circle" style="background:${color}; color:#fff">${icon}</div>
          <div>
            <div class="stage-title" style="color:${color}">${title}</div>
            <div class="stage-days" style="color:${color}">${days}</div>
          </div>
        </div>
        <div class="stage-chevron" style="color:${color}">▼</div>
      </div>
      <div class="stage-body">
        <div class="params-row mt-16">${paramsHTML}</div>
        <hr class="divider" style="margin:16px 0"/>
        <h4 style="margin-bottom:12px; font-size:0.9rem; color:var(--ink-mid)">Day-by-Day</h4>
        ${daysHTML}
      </div>
    </div>`;
}

function toggleStage(id) {
  const card = document.getElementById(id);
  if (card) card.classList.toggle('open');
}

      icon: '💧', symptom: 'Chicks sticky / wet at hatch',

    },
    {
      icon: '💥', symptom: 'High exploder rate (> 2%)',
      causes: 'Bacterial contamination — dirty eggs, cracked shells, contaminated incubator, poor hygiene.',
      fixes: 'Fix: Deep clean incubator. Remove dirty eggs before setting. Never wash eggs (destroys cuticle). Candle and remove any cracks.',
    },
    {
      icon: '🐣', symptom: 'Chicks hatching too early (< Day 20)',
      causes: 'Temperature too high during incubation. Early chicks often weak and small.',
      fixes: 'Fix: Calibrate thermometer. Reduce temperature by 0.2–0.3°C. Monitor with second independent thermometer.',
    },
    {
      icon: '⏰', symptom: 'Chicks hatching too late (> Day 22)',
      causes: 'Temperature too low. Old eggs (> 7 days pre-incubation). Cold spells during incubation.',
      fixes: 'Fix: Calibrate and increase temperature slightly. Use fresher eggs. Check for cold drafts near incubator.',
    },
  ];

  return items.map(i => `
    <div class="trouble-item">
      <div class="trouble-symptom">${i.icon} ${i.symptom}</div>
      <div class="trouble-causes"><strong>Likely causes:</strong> ${i.causes}</div>
      <div class="trouble-fixes">✓ ${i.fixes}</div>
    </div>`).join('');
}
</script>
</body>
