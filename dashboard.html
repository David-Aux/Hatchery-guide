<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Hatchery Guide</title>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .batch-card {
      background: #fff;
      border-radius: var(--radius-lg);
      border: 1px solid var(--parchment);
      padding: 20px;
      transition: box-shadow 0.2s, transform 0.2s;
      cursor: pointer;
      text-decoration: none;
      display: block;
      color: inherit;
    }
    .batch-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      color: inherit;
    }

    .batch-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .batch-name {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 2px;
    }

    .batch-meta {
      font-size: 0.78rem;
      color: var(--ink-faint);
    }

    .batch-day-label {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--amber-dark);
      background: var(--amber-pale);
      padding: 4px 10px;
      border-radius: 99px;
    }

    .batch-stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .batch-stat-mini {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .batch-stat-mini-value {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
    }

    .batch-stat-mini-label {
      font-size: 0.68rem;
      color: var(--ink-faint);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .batch-progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .batch-progress-row .progress-wrap { flex: 1; }

    .batch-progress-pct {
      font-size: 0.78rem;
      font-weight: 700;
      font-family: var(--font-mono);
      color: var(--ink-mid);
      min-width: 36px;
      text-align: right;
    }

    .batch-alert-row {
      margin-top: 10px;
    }

    .batch-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .alert-list { display: flex; flex-direction: column; gap: 8px; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-header h2 { font-size: 1.15rem; }

    .welcome-strip {
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 100%);
      border-radius: var(--radius-xl);
      padding: 28px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 28px;
      overflow: hidden;
      position: relative;
    }

    .welcome-strip::after {
      content: '🐣';
      position: absolute;
      right: 24px;
      font-size: 5rem;
      opacity: 0.12;
      pointer-events: none;
    }

    .welcome-strip h1 {
      color: #fff;
      font-size: 1.5rem;
      margin-bottom: 4px;
    }

    .welcome-strip p {
      color: rgba(255,255,255,0.65);
      font-size: 0.88rem;
    }

    @media (max-width: 600px) {
      .batch-grid { grid-template-columns: 1fr; }
      .welcome-strip { padding: 20px; }
      .welcome-strip h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
<script src="app.js"></script>
<script src="shell.js"></script>
<script>
(async () => {
  const ctx = await initShell({ page: 'dashboard', title: 'Dashboard' });
  if (!ctx) return;
  const { user, profile } = ctx;

  const hatcheryName = profile?.hatchery_name || 'Your Hatchery';
  const firstName    = (profile?.full_name || user.email).split(' ')[0];

  const pb = document.getElementById('page-body');

  pb.innerHTML = `
    <!-- Welcome -->
    <div class="welcome-strip">
      <div>
        <h1>Good day, ${firstName} 👋</h1>
        <p>${hatcheryName} — Hatchery Intelligence Dashboard</p>
      </div>
      <a href="new-batch.html" class="btn btn-primary">+ Start New Batch</a>
    </div>

    <!-- Summary Stats -->
    <div class="stat-grid mb-24" id="summary-stats">
      <div class="stat-card">
        <div class="stat-icon">🥚</div>
        <div class="stat-value" id="stat-active">—</div>
        <div class="stat-label">Active Batches</div>
      </div>
      <div class="stat-card green">
        <div class="stat-icon">🐥</div>
        <div class="stat-value" id="stat-hatched">—</div>
        <div class="stat-label">Total Hatched</div>
        <div class="stat-sub">All time</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📊</div>
        <div class="stat-value" id="stat-hatch-pct">—</div>
        <div class="stat-label">Avg Hatch Rate</div>
        <div class="stat-sub">Completed batches</div>
      </div>
      <div class="stat-card red">
        <div class="stat-icon">⚠️</div>
        <div class="stat-value" id="stat-alerts">0</div>
        <div class="stat-label">Alerts Today</div>
      </div>
    </div>

    <!-- Alerts -->
    <div id="alerts-section" class="mb-24 hidden">
      <div class="section-header">
        <h2>🔔 Alerts & Reminders</h2>
      </div>
      <div class="alert-list" id="alerts-list"></div>
    </div>

    <!-- Active Batches -->
    <div class="mb-24">
      <div class="section-header">
        <h2>Active Batches</h2>
        <a href="batches.html" class="btn btn-ghost btn-sm">View All</a>
      </div>
      <div id="active-batches">
        <div class="empty-state">
          <div class="spinner"></div>
        </div>
      </div>
    </div>

    <!-- Recent Completed -->
    <div>
      <div class="section-header">
        <h2>Recently Completed</h2>
        <a href="analytics.html" class="btn btn-ghost btn-sm">Analytics →</a>
      </div>
      <div class="card">
        <div class="card-body-flush">
          <table class="data-table" id="completed-table">
            <thead>
              <tr>
                <th>Batch</th>
                <th>Eggs Set</th>
                <th>Hatched</th>
                <th>Hatch %</th>
                <th>Completed</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="completed-tbody">
              <tr><td colspan="6" class="text-center" style="padding:32px;color:var(--ink-faint);">
                <span class="spinner"></span>
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  await loadDashboardData(user.id);
})();

async function loadDashboardData(userId) {
  // Fetch all batches
  const { data: batches, error } = await db
    .from('batches')
    .select(`
      *,
      hatch_records(*),
      candling_records(*)
    `)
    .eq('user_id', userId)
    .order('created_at', { ascending: false });

  if (error) { toast('Failed to load batches', 'error'); return; }

  const active    = batches.filter(b => b.status === 'active');
  const completed = batches.filter(b => b.status === 'completed');

  // Summary stats
  document.getElementById('stat-active').textContent = active.length;

  const totalHatched = completed.reduce((s, b) => s + (b.hatch_records?.[0]?.hatched || 0), 0);
  document.getElementById('stat-hatched').textContent = totalHatched.toLocaleString();

  const hatchPcts = completed
    .filter(b => b.hatch_records?.[0] && b.eggs_set > 0)
    .map(b => (b.hatch_records[0].hatched / b.eggs_set) * 100);

  const avgHatch = hatchPcts.length
    ? (hatchPcts.reduce((a, b) => a + b, 0) / hatchPcts.length).toFixed(1) + '%'
    : '—';
  document.getElementById('stat-hatch-pct').textContent = avgHatch;

  // Alerts
  const alerts = [];
  active.forEach(batch => {
    const day = incubationDay(batch.start_date);
    if (INCUBATION.CANDLE_DAYS.includes(day)) {
      alerts.push({ type: 'amber', icon: '🕯️', title: `Candle Day ${day}`, text: `Batch "${batch.batch_name}" — time to candle eggs.`, batchId: batch.id });
    }
    if (day === INCUBATION.LOCKDOWN_DAY) {
      alerts.push({ type: 'red', icon: '🔒', title: 'Lockdown Day', text: `Batch "${batch.batch_name}" — stop turning, increase humidity to 70%.`, batchId: batch.id });
    }
    if (day >= 20 && day <= 21) {
      alerts.push({ type: 'green', icon: '🐥', title: 'Hatch Window!', text: `Batch "${batch.batch_name}" — chicks should be hatching now!`, batchId: batch.id });
    }
  });

  document.getElementById('stat-alerts').textContent = alerts.length;

  if (alerts.length > 0) {
    document.getElementById('alerts-section').classList.remove('hidden');
    const list = document.getElementById('alerts-list');
    list.innerHTML = alerts.map(a => `
      <div class="alert alert-${a.type}" style="cursor:pointer" onclick="window.location.href='batch-detail.html?id=${a.batchId}'">
        <span class="alert-icon">${a.icon}</span>
        <div class="alert-text">
          <strong>${a.title}</strong>
          ${a.text}
        </div>
      </div>
    `).join('');
  }

  // Active batch cards
  const activeCon = document.getElementById('active-batches');
  if (active.length === 0) {
    activeCon.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🥚</div>
        <h3>No active batches</h3>
        <p>Start your first incubation batch to begin tracking.</p>
        <a href="new-batch.html" class="btn btn-primary mt-16">+ New Batch</a>
      </div>`;
  } else {
    activeCon.innerHTML = `<div class="batch-grid">${active.map(renderBatchCard).join('')}</div>`;
  }

  // Completed table
  const tbody = document.getElementById('completed-tbody');
  if (completed.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" class="text-center" style="padding:32px;color:var(--ink-faint);">No completed batches yet.</td></tr>`;
  } else {
    tbody.innerHTML = completed.slice(0, 10).map(b => {
      const hr = b.hatch_records?.[0];
      const hatchPct = hr && b.eggs_set > 0
        ? ((hr.hatched / b.eggs_set) * 100).toFixed(1) + '%'
        : '—';
      const pctNum = hr ? (hr.hatched / b.eggs_set) * 100 : 0;
      const color = pctNum >= 80 ? 'badge-green' : pctNum >= 60 ? 'badge-amber' : 'badge-red';
      return `
        <tr onclick="window.location.href='batch-detail.html?id=${b.id}'" style="cursor:pointer">
          <td><strong>${b.batch_name}</strong></td>
          <td>${b.eggs_set?.toLocaleString()}</td>
          <td>${hr?.hatched?.toLocaleString() ?? '—'}</td>
          <td><span class="badge ${color}">${hatchPct}</span></td>
          <td>${formatDate(b.completed_at || b.updated_at)}</td>
          <td><span class="badge badge-gray">Completed</span></td>
        </tr>`;
    }).join('');
  }
}

function renderBatchCard(batch) {
  const day     = incubationDay(batch.start_date);
  const pct     = Math.round((day / 21) * 100);
  const stage   = Analytics.getStage(day);
  const hatchDt = hatchDate(batch.start_date);
  const daysLeft = daysUntil(hatchDt);

  const alerts = [];
  if (INCUBATION.CANDLE_DAYS.includes(day)) alerts.push(`<span class="badge badge-amber">🕯️ Candle Today</span>`);
  if (day === 18) alerts.push(`<span class="badge badge-red">🔒 Lockdown</span>`);
  if (day >= 20)  alerts.push(`<span class="badge badge-green">🐥 Hatching!</span>`);

  return `
    <a href="batch-detail.html?id=${batch.id}" class="batch-card">
      <div class="batch-card-top">
        <div>
          <div class="batch-name">${batch.batch_name}</div>
          <div class="batch-meta">${batch.breed || 'Broiler/Layer'} · ${batch.egg_source || 'Unknown source'}</div>
        </div>
        <div class="batch-day-label">Day ${day}</div>
      </div>

      <div class="batch-stats-row">
        <div class="batch-stat-mini">
          <div class="batch-stat-mini-value">${batch.eggs_set?.toLocaleString()}</div>
          <div class="batch-stat-mini-label">Eggs Set</div>
        </div>
        <div class="batch-stat-mini">
          <div class="batch-stat-mini-value">${daysLeft > 0 ? daysLeft : 0}</div>
          <div class="batch-stat-mini-label">Days Left</div>
        </div>
        <div class="batch-stat-mini">
          <div class="batch-stat-mini-value" style="color:var(--amber)">${stage?.label || '—'}</div>
          <div class="batch-stat-mini-label">Stage</div>
        </div>
        <div class="batch-stat-mini">
          <div class="batch-stat-mini-value">${formatDate(hatchDt)}</div>
          <div class="batch-stat-mini-label">Hatch Date</div>
        </div>
      </div>

      <div class="batch-progress-row">
        <div class="progress-wrap">
          <div class="progress-bar" style="width:${pct}%; background:${stage?.color || 'var(--amber)'}"></div>
        </div>
        <span class="batch-progress-pct">${pct}%</span>
      </div>

      ${alerts.length ? `<div class="batch-alert-row flex gap-8" style="margin-top:10px;flex-wrap:wrap">${alerts.join('')}</div>` : ''}
    </a>`;
}
</script>
</body>
</html>
